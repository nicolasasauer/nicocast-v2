# Cargo cross-compilation configuration for Raspberry Pi Zero 2W (aarch64).
#
# This file is used automatically by cargo when you pass
# --target aarch64-unknown-linux-gnu, which the Dockerfile does.
# It has no effect on native x86_64 builds.

[target.aarch64-unknown-linux-gnu]
# Use the Debian/Ubuntu aarch64 cross-linker (installed in the Docker image).
linker = "aarch64-linux-gnu-gcc"
